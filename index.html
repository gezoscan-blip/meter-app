/* =========================================================
   МАГІЧНИЙ МІСТ ДЛЯ ЗВ'ЯЗКУ З GOOGLE (POLYFILL)
========================================================= */
// ⚠️⚠️⚠️ ОБОВ'ЯЗКОВО ВСТАВ СЮДИ СВОЄ ОСТАННЄ ПОСИЛАННЯ /EXEC !!!
const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbxZcZAM5rNQhKrMLj153cX65xY0GqbbFx2mScPXL2tnXM-qZq5cTP5avYSb4OmIEERF/exec";

function sendRequest(action, payload, callback) {
  const btn = (typeof window.event !== 'undefined' && window.event.target) ? window.event.target : null;
  const oldText = btn ? btn.innerText : "";
  if (btn && btn.tagName === "BUTTON") btn.innerText = "⏳...";

  fetch(GOOGLE_API_URL, {
    method: "POST",
    body: JSON.stringify({ action: action, ...payload }),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  })
  .then(res => res.text()) 
  .then(text => {
    if (btn && btn.tagName === "BUTTON") btn.innerText = oldText; 
    let data;
    try { data = JSON.parse(text); } 
    catch(e) { alert("❌ Гугл відповів помилкою:\n" + text.substring(0, 150)); return; }

    if (data.error) { alert("⚠️ Помилка в Apps Script:\n" + data.error); return; }

    try { if (callback) callback(data); } 
    catch(err) { alert("⚠️ Помилка у формі на телефоні:\n" + err.message); }
  })
  .catch(err => {
    if (btn && btn.tagName === "BUTTON") btn.innerText = oldText;
    alert("❌ Немає зв'язку! Помилка: " + err.message);
  });
}

const google = {
  script: {
    run: {
      withSuccessHandler: function(callback) {
        return {
          login: (tab, pass) => sendRequest("login", {tab, pass}, callback),
          checkWorker: (tab) => sendRequest("checkWorker", {tab}, callback),
          findAccountFast: (account) => sendRequest("findAccountFast", {account}, callback),
          searchAccounts: (part) => sendRequest("searchAccounts", {part}, callback),
          getMeterTypes: () => sendRequest("getMeterTypes", {}, callback),
          saveData: (data) => sendRequest("saveData", {data}, callback)
        };
      },
      saveData: (data) => sendRequest("saveData", {data}, null)
    }
  }
};

/* =========================================================
ГЛОБАЛЬНІ ЗМІННІ

window.onload = function(){
  google.script.run.withSuccessHandler(function(list){ meterTypes = list || []; }).getMeterTypes();
  const savedWorker = localStorage.getItem("worker");
  if(!savedWorker) return;

  if(navigator.onLine){
    google.script.run.withSuccessHandler(res=>{
      if(res.ok){ worker = savedWorker; workerName = res.name || ""; afterLogin(); }
      else{ localStorage.clear(); }
    }).checkWorker(savedWorker);
  }else{
    worker = savedWorker; workerName = "Офлайн"; afterLogin();
  }
};

function doLogin(){
  const tab = document.getElementById("tab").value.trim();
  const pass = document.getElementById("pass").value.trim();
  if(!tab){ alert("Введіть табельний номер"); return; }

  if(navigator.onLine){
    if(!pass){ alert("Введіть пароль"); return; }
    google.script.run.withSuccessHandler(res=>{
      if(res.success){ worker = tab; workerName = res.name || ""; afterLogin(); }
      else{ alert(res.message); }
    }).login(tab,pass);
  }else{
    worker = tab; workerName = "Офлайн"; alert("Офлайн режим"); afterLogin();
  }
}

function afterLogin(){
  localStorage.setItem("worker",worker);
  localStorage.setItem("workerName",workerName);
  const passInput = document.getElementById("pass");
  if(passInput && passInput.value){ localStorage.setItem("workerPass",passInput.value); }
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("who").innerHTML = "Т/н: <b>"+worker+"</b> "+workerName;

/* =========================================================
ПАРСИНГ ПЛОМБ ТА СПИСКИ
========================================================= */
function normalizePlombNumber(entry){
  const m = String(entry || "").trim().match(/^([A-Za-zА-Яа-яІіЇїЄєҐґСМ]{0,2})\s*(\d{6,})/);
  if(!m) return ""; return (m[1] || "") + (m[2] || "");
}

function parsePlombs(plombText){
  const result = { lichil: "", optop: "", fasad: ["", ""], vkp: "", imp: ["", "", ""], other: [] };
  let text = String(plombText || "").replace(/\s+/g, " ").trim();
  if(!text) return result;
  const entryRegex = /((?:[A-Za-zА-Яа-яІіЇїЄєҐґСМ]{0,2}\s*)?\d{6,}.*?)(?=(?:\s+(?:[A-Za-zА-Яа-яІіЇїЄєҐґСМ]{0,2}\s*)?\d{6,}\b)|$)/g;
  const entries = []; let match;
  while((match = entryRegex.exec(text)) !== null){ const item = match[1].trim(); if(item) entries.push(item); }
  entries.forEach(item => {
    const low = item.toLowerCase(); const num = normalizePlombNumber(item);
    if(!num){ result.other.push(item); return; }
    if(low.includes("лічил")){ if(!result.lichil) result.lichil = num; else result.other.push(item); return; }
    if(low.includes("оптоп")){ if(!result.optop) result.optop = num; else result.other.push(item); return; }
    if(low.includes("фасад")){ const idx = result.fasad.findIndex(v => !v); if(idx !== -1) result.fasad[idx] = num; else result.other.push(item); return; }
    if(low.includes("вкп") || low.includes("ввідн")){ if(!result.vkp) result.vkp = num; else result.other.push(item); return; }
    if(low.includes("імп") || low.includes("корпу") || low.includes("кожух")){ const idx = result.imp.findIndex(v => !v); if(idx !== -1) result.imp[idx] = num; else result.other.push(item); return; }
    result.other.push(item);
  });
  result.other = result.other.join("\n");
  return result;
}

    box.appendChild(div);
  });
  if(meterTypes.length) box.classList.remove("hidden");
}

function filterMeterTypes(value){
  const box = document.getElementById("meterTypeHints"); if(!box) return;
  const q = String(value || "").trim().toLowerCase(); box.innerHTML = "";
  let filtered = meterTypes; if(q) filtered = meterTypes.filter(item => item.toLowerCase().includes(q));
  filtered.slice(0, 150).forEach(item => {
    const div = document.createElement("div"); div.className = "meterTypeItem"; div.textContent = item;
    div.onclick = function(){ document.getElementById("replaceInstalledMeterType").value = item; box.classList.add("hidden"); };
    box.appendChild(div);
  });
  if(filtered.length) box.classList.remove("hidden"); else box.classList.add("hidden");
}
document.addEventListener("click", function(e){
  const input = document.getElementById("replaceInstalledMeterType"); const box = document.getElementById("meterTypeHints");

});

function setPhase(p){ fasadPhase = p; }
function goFasadStep2(){
  const order = document.getElementById("fasadOrder").value.trim(); const phase = document.querySelector('input[name="phase"]:checked');
  if(!order || !phase){ alert("Заповніть номер наряду та фазність!"); return; }
  document.getElementById("fasadStep1").classList.add("hidden"); document.getElementById("fasadStep2").classList.remove("hidden");
  if(fasadPhase == 1){ document.getElementById("mat1f").classList.remove("hidden"); document.getElementById("mat3f").classList.add("hidden"); }
  else{ document.getElementById("mat3f").classList.remove("hidden"); document.getElementById("mat1f").classList.add("hidden"); }
}
function backToFasad1(){ document.getElementById("fasadStep2").classList.add("hidden"); document.getElementById("fasadStep1").classList.remove("hidden"); }
function goFasadStep3(){ document.getElementById("fasadStep2").classList.add("hidden"); document.getElementById("fasadStep3").classList.remove("hidden"); }
function backToFasad2(){ document.getElementById("fasadStep3").classList.add("hidden"); document.getElementById("fasadStep2").classList.remove("hidden"); }

function goFasadStep4(){
  const mark = document.getElementById("fasadDemoMark").value.trim(); const length = document.getElementById("fasadDemoLength").value.trim(); const demoBy = document.querySelector('input[name="fasadDemoBy"]:checked');
  if(!mark || !length || !demoBy){ alert("Заповніть демонтаж!"); return; }
  isFasadFlow = true; const acc = document.getElementById("account").value.trim();
  document.getElementById("fasadStep3").classList.add("hidden");
  if(navigator.onLine){
    google.script.run.withSuccessHandler(res=>{ if(res.found){ openReplaceFromFasad(res.data); }else{ alert("Не знайдено"); } }).findAccountFast(acc);
  }else{ openReplaceFromFasad({account: acc, pib: "", street: "", house: "", flat: "", type: "", meter: "", plomb: ""}); }
}

function openReplaceFromFasad(d){
  document.getElementById("meterReplaceStep1").classList.remove("hidden");
  document.getElementById("replaceWorkerTab1").innerText = worker; document.getElementById("replaceWorkerName1").innerText = workerName;
  document.getElementById("replaceAccountView1").innerText = d.account || ""; document.getElementById("replacePibView1").innerText = d.pib || "";
  document.getElementById("replaceAddressView1").innerText = (d.street || "") + " " + (d.house || "") + " " + (d.flat || "");
  document.getElementById("replaceRemovedMeterType").value = d.type || ""; document.getElementById("replaceRemovedMeterNumber").value = d.meter || "";
  const plombs = parsePlombs(d.plomb || "");
  document.getElementById("replaceRemovedLichil").value = plombs.lichil; document.getElementById("replaceRemovedOptop").value = plombs.optop;
  document.getElementById("replaceRemovedFasad1").value = plombs.fasad[0]; document.getElementById("replaceRemovedFasad2").value = plombs.fasad[1];
  document.getElementById("replaceRemovedVkp").value = plombs.vkp;
  document.getElementById("replaceRemovedImp1").value = plombs.imp[0]; document.getElementById("replaceRemovedImp2").value = plombs.imp[1]; document.getElementById("replaceRemovedImp3").value = plombs.imp[2];
  document.getElementById("replaceRemovedOther").value = plombs.other; resizeTextarea(document.getElementById("replaceRemovedOther"));
  document.getElementById("replaceRemovedT0").value = ""; document.getElementById("replaceRemovedT1").value = ""; document.getElementById("replaceRemovedT2").value = ""; document.getElementById("replaceRemovedT3").value = "";
}

function sendDataToServer(data, hintId, formsToHide){
  if(navigator.onLine){
    google.script.run.withSuccessHandler(function(res){
      if(hintId) document.getElementById(hintId).textContent = "✅ Збережено";
      setTimeout(showSearchBlock, 1500);
    }).saveData(data);
  } else { saveOffline(data); if(hintId) document.getElementById(hintId).textContent = "Збережено офлайн"; setTimeout(showSearchBlock, 1500); }
}

function saveOffline(data){
  let list = JSON.parse(localStorage.getItem("offlineData") || "[]");
  list.push(data); localStorage.setItem("offlineData",JSON.stringify(list));
}

function offlineMode(){
  const acc = document.getElementById("account").value.trim();
  if(!selectedWork){ alert("Оберіть вид робіт"); return; }
  if(!/^\d{10}$/.test(acc)){ alert("Введіть 10 цифр особового рахунку"); return; }
  const formType = openSelectedWorkForm();
  if(!formType) return;
  // Очищення полів для офлайн...
  if(formType === "tech"){ document.getElementById("workerTab").innerText = worker; document.getElementById("workerName").innerText = workerName; document.getElementById("workTypeView").innerText = selectedWork; document.getElementById("accountView").innerText = acc; document.getElementById("pibView").innerText = ""; document.getElementById("addressView").innerText = ""; document.getElementById("meterType").value = ""; document.getElementById("meterNumber").value = ""; document.getElementById("removedLichil").value = ""; document.getElementById("installedLichil").value = ""; document.getElementById("t0").value = ""; }
  else if(formType === "replace"){ document.getElementById("replaceWorkerTab1").innerText = worker; document.getElementById("replaceWorkerName1").innerText = workerName; document.getElementById("replaceAccountView1").innerText = acc; document.getElementById("replacePibView1").innerText = ""; document.getElementById("replaceAddressView1").innerText = ""; document.getElementById("replaceRemovedMeterType").value = ""; document.getElementById("replaceRemovedMeterNumber").value = ""; }
  else if(formType === "control"){ document.getElementById("controlWorkerTab").innerText = worker; document.getElementById("controlWorkerName").innerText = workerName; document.getElementById("controlAccountView").innerText = acc; document.getElementById("controlPibView").innerText = ""; document.getElementById("controlAddressView").innerText = ""; document.getElementById("controlMeterType").value = ""; document.getElementById("controlMeterNumber").value = ""; }
}
